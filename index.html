<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="在线藏文字体图片生成器，支持手机和电脑使用，可导出透明背景 PNG。" />
    <title>藏文字体图片生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jomolhari&family=Noto+Serif+Tibetan:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="previewPage" class="page active" aria-label="生成与预览">
        <header class="hero-bar">
          <div>
            <p class="eyebrow">Tibetan Type Studio</p>
            <h1>藏文字体图片生成器</h1>
          </div>
          <button id="openLibraryTop" type="button" class="font-icon-button" title="选择字体" aria-label="选择字体">
            ཨ
          </button>
        </header>

        <section class="preview-panel">
          <div class="preview-meta">
            <span id="fontStatus">正在加载网页字体</span>
            <span>拖动预览框右下角调整画布大小</span>
          </div>
          <div id="previewFrame" class="preview-frame">
            <button id="fullscreenToggle" type="button" class="canvas-corner-button" title="全屏画布" aria-label="全屏画布">
              ⛶
            </button>
            <button id="canvasToolsToggle" type="button" class="canvas-tools-toggle" title="调节" aria-label="调节">
              调
            </button>
            <canvas id="mainCanvas" aria-label="当前字体图片预览"></canvas>
          </div>
          <div class="actions">
            <button id="downloadSelected" type="button">下载当前 PNG</button>
            <button id="refresh" type="button" class="secondary">刷新预览</button>
          </div>
        </section>

        <section class="control-panel">
          <label class="field text-field">
            <span>输入文字</span>
            <textarea id="textInput" spellcheck="false">བོད་ཡིག་གི་ཡིག་གཟུགས་དཔེ་སྟོན།</textarea>
          </label>

          <label class="sr-only">
            当前字体
            <select id="fontSelect"></select>
          </label>

          <div class="compact-grid">
            <label class="range-field">
              <span>字号 <output id="fontSizeValue">72</output></span>
              <input id="fontSize" type="range" min="16" max="180" step="1" value="72" />
            </label>
            <label class="range-field">
              <span>留白 <output id="paddingValue">48</output></span>
              <input id="padding" type="range" min="0" max="140" step="1" value="48" />
            </label>
            <label class="range-field">
              <span>行距 <output id="lineHeightValue">1.35</output></span>
              <input id="lineHeight" type="range" min="0.9" max="2.2" step="0.05" value="1.35" />
            </label>
            <label class="range-field">
              <span>字距 <output id="letterSpacingValue">0</output></span>
              <input id="letterSpacing" type="range" min="0" max="28" step="1" value="0" />
            </label>
          </div>

          <div class="position-panel">
            <span>位置</span>
            <div class="position-grid" aria-label="文字位置">
              <button type="button" data-align-x="left">左</button>
              <button type="button" data-align-x="center" class="active">中</button>
              <button type="button" data-align-x="right">右</button>
              <button type="button" data-align-y="top">上</button>
              <button type="button" data-align-y="middle" class="active">中</button>
              <button type="button" data-align-y="bottom">下</button>
            </div>
          </div>

          <div class="compact-grid color-grid">
            <label class="field">
              <span>文字</span>
              <input id="textColor" type="color" value="#121212" />
            </label>
            <label class="field">
              <span>背景</span>
              <input id="backgroundColor" type="color" value="#f8f3e8" />
            </label>
            <label class="toggle">
              <input id="transparentBackground" type="checkbox" />
              <span>透明</span>
            </label>
          </div>

          <details class="more-panel">
            <summary>更多</summary>
            <label class="field upload">
              <span>临时导入字体</span>
              <input id="fontUpload" type="file" accept=".ttf,.otf,.woff,.woff2" multiple />
            </label>
            <button id="downloadAll" type="button" class="secondary">批量下载全部字体</button>
          </details>
        </section>
      </section>

      <section id="libraryPage" class="page" aria-label="字体库">
        <header class="hero-bar">
          <div>
            <p class="eyebrow">Font Library</p>
            <h1>选择字体</h1>
            <p id="libraryCount">字体加载中</p>
          </div>
          <button id="backToPreviewTop" type="button" class="small-button">完成</button>
        </header>

        <section class="library-tools">
          <label class="field">
            <span>搜索字体</span>
            <input id="fontSearch" type="search" placeholder="Qomolangma / Monlam / Uchen..." autocomplete="off" />
          </label>
        </section>

        <div id="fontGallery" class="font-list"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="页面切换">
      <button id="navPreview" type="button" class="active">预览</button>
      <button id="navLibrary" type="button">字体</button>
    </nav>

    <script src="./app.js"></script>
  </body>
</html>
