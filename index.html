<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="在线藏文字体图片生成器，支持手机和电脑使用，可导出透明背景 PNG。"
    />
    <title>藏文字体图片生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jomolhari&family=Noto+Serif+Tibetan:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-label="藏文字体图片生成器">
        <aside class="panel controls">
          <div class="brand">
            <h1>藏文字体图片生成器</h1>
            <p>所有默认样式都在线加载，手机和电脑无需安装字体即可导出 PNG。</p>
          </div>

          <label class="field">
            <span>藏文内容</span>
            <textarea id="textInput" spellcheck="false">བོད་ཡིག་གི་ཡིག་གཟུགས་དཔེ་སྟོན།</textarea>
          </label>

          <div class="grid two">
            <label class="field">
              <span>在线字体样式</span>
              <select id="fontSelect"></select>
            </label>
            <label class="field">
              <span>字号</span>
              <input id="fontSize" type="number" min="16" max="220" value="72" />
            </label>
          </div>

          <div class="grid two">
            <label class="field">
              <span>行距</span>
              <input id="lineHeight" type="number" min="0.8" max="2.4" step="0.05" value="1.35" />
            </label>
            <label class="field">
              <span>留白</span>
              <input id="padding" type="number" min="0" max="180" value="48" />
            </label>
          </div>

          <div class="grid two">
            <label class="field">
              <span>文字颜色</span>
              <input id="textColor" type="color" value="#121212" />
            </label>
            <label class="field">
              <span>背景颜色</span>
              <input id="backgroundColor" type="color" value="#f8f3e8" />
            </label>
          </div>

          <label class="toggle">
            <input id="transparentBackground" type="checkbox" />
            <span>导出透明背景 PNG</span>
          </label>

          <label class="field upload">
            <span>导入自己的字体文件</span>
            <input id="fontUpload" type="file" accept=".ttf,.otf,.woff,.woff2" multiple />
          </label>

          <div class="actions">
            <button id="downloadSelected" type="button">下载当前 PNG</button>
            <button id="downloadAll" type="button" class="secondary">批量下载全部样式</button>
          </div>
        </aside>

        <section class="preview-area">
          <div class="toolbar">
            <div>
              <strong id="currentFontName">Noto Serif Tibetan Regular</strong>
              <span id="fontStatus">正在加载在线字体</span>
            </div>
            <button id="refresh" type="button" title="刷新预览">刷新</button>
          </div>

          <canvas id="mainCanvas" aria-label="当前字体图片预览"></canvas>

          <div class="gallery-head">
            <h2>在线样式预览</h2>
            <span>默认样式无需本机安装字体，导出图片效果与预览一致</span>
          </div>
          <div id="fontGallery" class="gallery"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
